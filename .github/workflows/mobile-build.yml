name: Mobile Build (Internal)
on:
  # This allows your AL Action to trigger the build via API
  repository_dispatch:
    types: [trigger-mobile-build]
  # Standard trigger on push to main
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ?? Checkout
        uses: actions/checkout@v4

      - name: ?? Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-cache: true

      - name: ?? Install Dependencies
        run: npm install

      - name: ?? Build Internal APK
        # This uses the 'preview' profile from your eas.json to create a direct download link
        run: eas build --platform android --profile preview --non-interactive
