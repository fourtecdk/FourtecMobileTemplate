name: Initialize

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App display name (e.g. "CustomerName")'
        required: true
        default: 'Fourtec Mobile'
      app_slug:
        description: 'Expo project slug (e.g. "fourtec-customername", lowercase + hyphens only)'
        required: true
        default: 'fourtec-mobile'

jobs:
  initialize-project:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔗 Provision Brand New Project UUID
        id: create_project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Clean out old trace linkages
          rm -rf .eas
          
          # 2. Hide your dynamic configuration file out of sight temporarily
          if [ -f app.config.js ]; then mv app.config.js app.config.js.bak; fi
          
          # 3. Generate a tiny, static app.json file for the initialization tool
          echo "Writing temporary static configuration context..."
          echo '{"expo": {"name": "${{ github.event.inputs.app_name }}", "slug": "${{ github.event.inputs.app_slug }}", "owner": "bruger2"}}' > app.json
          
          # 4. Trigger the official initialization command. It will seamlessly 
          # provision the dashboard card and save the tracking metadata inside app.json
          npx eas-cli init --non-interactive
          
          # 5. Extract the brand new UUID using a quick Node script
          NEW_UUID=$(node -e "const app = require('./app.json'); console.log(app.expo?.extra?.eas?.projectId || '');")
          
          # 6. Clean up: Delete the dummy json and restore your dynamic core file
          rm app.json
          if [ -f app.config.js.bak ]; then mv app.config.js.bak app.config.js; fi
          
          # 7. Abort if extraction was empty
          if [ -z "$NEW_UUID" ]; then
            echo "❌ ERROR: Failed to capture a valid project identity token from the cloud handshake."
            exit 1
          fi
          
          echo "target_uuid=$NEW_UUID" >> $GITHUB_OUTPUT
          
          echo "--------------------------------------------------------"
          echo "SUCCESS: Brand New Project Allocated on Expo Dashboard!"
          echo "ASSIGNED UUID: $NEW_UUID"
          echo "--------------------------------------------------------"

      - name: 💾 Save Project Settings as Repository Variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set APP_NAME    --body "${{ github.event.inputs.app_name }}"
          gh variable set APP_SLUG    --body "${{ github.event.inputs.app_slug }}"
          gh variable set EXPO_PROJECT_ID --body "${{ steps.create_project.outputs.target_uuid }}"
          echo "Variables successfully synchronized to GitHub Cloud Engine!"

      - name: ℹ️ Next Steps Guide
        run: |
          echo "Initialization complete. Repository variables are set."
          echo "You can now run the 'Publish App' workflow smoothly."