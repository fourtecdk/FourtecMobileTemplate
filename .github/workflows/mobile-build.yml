name: Mobile Build (Internal)

on:
  # Allows your orchestration code or external platforms to trigger this via API
  repository_dispatch:
    types: [trigger-mobile-build]
  # Triggers when you push changes to the main branch
  push:
    branches: [ main ]
  # Allows you to click a "Run Workflow" button manually in GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🏗 Initialize Project & Build Internal APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # 1. Clear any old structural data or IDs that traveling from the template
          rm -rf .eas
          
          # 2. Silently provision a unique, completely isolated project card on your Expo dashboard
          npx eas-cli project:init --force --non-interactive
          
          # 3. Fire off the compiler and disconnect immediately to save build minutes
          eas build --platform android --profile preview --non-interactive --no-wait