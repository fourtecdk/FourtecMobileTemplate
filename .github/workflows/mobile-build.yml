name: Initialize

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App display name (e.g. "CustomerName")'
        required: true
        default: 'Fourtec Mobile'
      app_slug:
        description: 'Expo project slug (e.g. "fourtec-customername", lowercase + hyphens only)'
        required: true
        default: 'fourtec-mobile'

jobs:
  initialize-project:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔗 Provision Brand New Project UUID
        id: create_project
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          rm -rf .eas
          echo "Forcing project creation on Expo Cloud Servers..."
          
          # 👇 We call project:create instead of info/init to force-allocate a new slot cleanly
          npx eas-cli project:create --template ${{ github.event.inputs.app_slug }} --json --non-interactive > project-meta.json
          cat project-meta.json
          
          # Extract the brand new UUID generated by the cloud server
          NEW_UUID=$(cat project-meta.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            console.log(data.id || data.projectId || '');
          ")
          
          if [ -z "$NEW_UUID" ]; then
            echo "❌ ERROR: Expo failed to return a valid project identification token."
            exit 1
          fi
          
          echo "target_uuid=$NEW_UUID" >> $GITHUB_OUTPUT
          
          echo "--------------------------------------------------------"
          echo "SUCCESS: Brand New Project Allocated on Expo Dashboard!"
          echo "ASSIGNED UUID: $NEW_UUID"
          echo "--------------------------------------------------------"

      - name: 💾 Save Project Settings as Repository Variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set APP_NAME    --body "${{ github.event.inputs.app_name }}"
          gh variable set APP_SLUG    --body "${{ github.event.inputs.app_slug }}"
          gh variable set EXPO_PROJECT_ID --body "${{ steps.create_project.outputs.target_uuid }}"
          echo "Variables successfully saved to GitHub Cloud Engine!"

      - name: ℹ️ Next Steps Guide
        run: |
          echo "Initialization complete. Repository variables are set."
          echo "You can now run the 'Publish App' workflow smoothly."