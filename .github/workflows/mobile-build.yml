name: Initialize

on:
  workflow_dispatch:

jobs:
  initialize-project:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔗 Provision Expo Dashboard Slot
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Pass the variables so the configuration block can resolve during validation
          EXPO_PUBLIC_APP_NAME: "AS Knud Jepsen Mobile"
          EXPO_PUBLIC_APP_SLUG: "fourtec-asknudjepsen"
          EXPO_PROJECT_ID: "your-client-specific-uuid-here"
        run: |
          # We use project:info instead of project:init. 
          # This forces EAS to look up or assert the project's existence on the cloud 
          # without attempting to write back to your dynamic app.config.js!
          npx eas-cli project:info --non-interactive

      - name: ℹ️ Next Steps
        run: |
          echo "Project slot successfully asserted/created on Expo Dashboard."
          echo "Run the 'Publish App' workflow whenever you are ready to compile the actual APK."