name: Publish App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to publish'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  publish:
    name: 🚀 Build & Publish APK
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🚀 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔑 Resolve Platform
        id: platform
        run: |
          PLATFORM="${{ github.event.inputs.platform }}"
          echo "target=${PLATFORM:-android}" >> $GITHUB_OUTPUT

      - name: 🏗 Build & Wait for Artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Environment variables mapped strictly at the workflow step level
          EXPO_PUBLIC_APP_NAME: "AS Knud Jepsen Mobile"
          EXPO_PUBLIC_APP_SLUG: "fourtec-asknudjepsen"
          EXPO_PROJECT_ID: "your-client-specific-uuid-here"
          EXPO_PUBLIC_BC_TENANT_ID: "1e11ede3-9705-4444-9a92-4a61e1b40e10"
          EXPO_PUBLIC_BC_CLIENT_ID: "b5bfa344-0d9a-45b8-961e-bd34a543c4b6"
          EXPO_PUBLIC_BC_CLIENT_SECRET: ${{ secrets.BC_CLIENT_SECRET }}
          EXPO_PUBLIC_BC_ENVIRONMENT: "MCP_Server_THA_HBO"
          EXPO_PUBLIC_BC_COMPANY_ID: "5097a676-dc3c-f111-bec2-7c1e52fc7b51"
          EXPO_PUBLIC_BC_BASE_URL: "https://api.businesscentral.dynamics.com/v2.0"
          EXPO_PUBLIC_BC_SCOPE: "https://api.businesscentral.dynamics.com/.default"
        run: |
          eas build \
            --platform ${{ steps.platform.outputs.target }} \
            --profile preview \
            --non-interactive \
            --wait

      - name: 📥 Download Built Artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p dist
          eas build:list \
            --platform ${{ steps.platform.outputs.target }} \
            --status finished \
            --limit 1 \
            --json \
            --non-interactive > dist/build-meta.json
          cat dist/build-meta.json

          APK_URL=$(cat dist/build-meta.json | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const build = Array.isArray(data) ? data[0] : data;
            console.log(build.artifacts?.buildUrl || build.buildUrl || '');
          ")

          if [ -n "$APK_URL" ]; then
            echo "Downloading artifact from $APK_URL"
            curl -L -o dist/fourtec-mobile.apk "$APK_URL"
          else
            echo "No artifact URL found — check build-meta.json above"
          fi

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fourtec-mobile-${{ github.ref_name || 'manual' }}
          path: dist/fourtec-mobile.apk
          retention-days: 30